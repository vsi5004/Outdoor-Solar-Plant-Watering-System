name: Host Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Needed by dorny/test-reporter to create Check Runs and annotate PRs.
permissions:
  checks: write
  pull-requests: write

jobs:
  host-tests:
    name: Build and run host-based Unity tests
    runs-on: ubuntu-latest
    container:
      image: espressif/idf:v5.4.1

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build host tests (linux target)
        working-directory: test/host
        run: |
          . /opt/esp/idf/export.sh
          idf.py --preview set-target linux build

      # Tee preserves stdout for the report while pipefail propagates a non-zero
      # exit code from the test binary so the step still fails on test failures.
      # Wall-clock time is captured so the JUnit report shows accurate duration.
      - name: Run host tests
        working-directory: test/host
        shell: bash -eo pipefail {0}
        run: |
          T0=$(date +%s%3N)
          ./build/test_host.elf | tee unity-output.txt
          echo $(($(date +%s%3N) - T0)) > /tmp/test-duration-ms.txt

      - name: Convert Unity output to JUnit XML
        if: always()
        run: |
          DURATION_MS=$(cat /tmp/test-duration-ms.txt 2>/dev/null || echo 0)
          python3 scripts/unity_to_junit.py --duration-ms "$DURATION_MS" \
            < test/host/unity-output.txt > test-results.xml

      # dorny/test-reporter runs git inside the espressif container where the
      # workspace is owned by a different UID — mark it safe first.
      - name: Fix git safe directory
        if: always()
        run: git config --global --add safe.directory '*'

      # Publishes a Check Run visible on the commit and in any open PR.
      # fail-on-error: false prevents a permissions issue on fork PRs from
      # masking the real test failure reported by the Run step above.
      - name: Publish test results
        if: always()
        uses: dorny/test-reporter@v1
        with:
          name: Unity Host Tests
          path: test-results.xml
          reporter: java-junit
          fail-on-error: false
