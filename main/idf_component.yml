## IDF Component Manager manifest for the main component.
## Run `idf.py update-dependencies` after changing version constraints.
dependencies:
  ## Zigbee stack for ESP32-C6.  Pin to a minor version once validated on
  ## hardware so an upstream update cannot silently break the build.
  espressif/esp-zigbee-lib:
    version: ">=1.5.0"
  ## Required by esp-zigbee-lib at CMake link time.
  espressif/esp-zboss-lib:
    version: ">=1.5.0"

  ## WS2812 RGB LED driver (RMT-based); used for the onboard status LED.
  espressif/led_strip:
    version: ">=3.0.0"

  ## Enforce a minimum IDF version so the build fails fast on an
  ## incompatible toolchain rather than with a confusing linker error.
  idf:
    version: ">=5.4.0"
